stages:
  validate:
    cmd: python src/validate_data.py
    deps:
      - src/validate_data.py
      - data/raw_data.csv

  clean:
    cmd: python src/clean_data.py
    deps:
      - src/clean_data.py
      - data/raw_data.csv
    outs:
      - data/cleaned_data.csv  

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/cleaned_data.csv

      